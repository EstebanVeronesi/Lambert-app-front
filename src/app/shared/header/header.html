<header class="navbar navbar-expand-lg shadow bg-gray-custom">
  <div class="container-fluid">
    <!-- Logo -->

    <img
      src="assets/images/logo.svg"
      alt="Logo"
      class="logo navbar-brand d-flex align-items-cente"
    />

    <!-- Botón hamburguesa -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNavAltMarkup"
      aria-controls="navbarNavAltMarkup"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menú colapsable -->
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav ms-auto">
        <a class="nav-link active text-white" aria-current="page" routerLink="inicio">Home</a>

        @if (!isLoggedIn()) {
        <a class="nav-link text-white" routerLink="iniciar-sesion">Iniciar sesión</a>
        } @else {
        <a class="nav-link text-white" routerLink="/inicio" (click)="logout()">Cerrar sesión</a>
        }
        <a class="nav-link text-white" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
      </div>
    </div>
  </div>
</header>
